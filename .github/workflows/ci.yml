name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  python-validation:
    name: Python validation (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Compile sources and tests
        run: python -m compileall src tests

      - name: Check whitespace
        run: git diff --check

      - name: Smoke test local trial fixture
        run: |
          cd "${RUNNER_TEMP}"
          diamonddust local-trial-fixture \
            --vault-root "${RUNNER_TEMP}/diamonddust-local-trial-${{ matrix.python-version }}" \
            --created-at 2026-05-14T00:00:00Z
